# Alembic configuration for TTA PostgreSQL migrations.
#
# The actual database URL is read from the TTA_DATABASE_URL environment
# variable inside env.py — the value below is intentionally left empty.

[alembic]
script_location = migrations/postgres
prepend_sys_path = .
# sqlalchemy.url is set programmatically in env.py
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
