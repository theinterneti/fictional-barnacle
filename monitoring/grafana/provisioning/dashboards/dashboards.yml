# Grafana dashboard provisioning — auto-loads JSON definitions
# Spec ref: S15 FR-15.27 (auto-provisioned on Grafana start)

apiVersion: 1

providers:
  - name: TTA
    orgId: 1
    folder: TTA
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
