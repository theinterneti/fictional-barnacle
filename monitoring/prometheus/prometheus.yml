# Prometheus configuration for TTA
# Spec ref: S15 §5 (monitoring infrastructure)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "tta-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["tta-api:8000"]
        labels:
          service: "tta-api"
