name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --dev --frozen
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pyright

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --dev --frozen
      - run: uv run pytest tests/unit/ -v --cov=tta --cov-report=xml --cov-fail-under=80

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --dev --frozen
      - name: Start test services
        run: timeout 120 docker compose -f docker-compose.test.yml up -d --wait || echo "::warning::Services failed to start within 2 minutes"
      - name: Run integration tests
        run: |
          # Exit code 5 = no tests collected (acceptable during bootstrap)
          uv run pytest tests/integration/ -v --timeout=60 || [ $? -eq 5 ]

      - run: docker compose -f docker-compose.test.yml down
        if: always()

  merge-guard:
    name: Merge Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify branch is up-to-date with main
        run: |
          git fetch origin main --quiet
          PR_HEAD="${{ github.event.pull_request.head.sha }}"
          MAIN_TIP=$(git rev-parse origin/main)

          echo "origin/main : $MAIN_TIP"
          echo "PR head     : $PR_HEAD"

          if git merge-base --is-ancestor "$MAIN_TIP" "$PR_HEAD"; then
            echo "✓ Branch includes all commits from main."
          else
            echo "✗ Branch is behind main — please merge or rebase:"
            echo ""
            git log --oneline "$PR_HEAD..origin/main" || true
            echo ""
            echo "  Fix: git fetch origin && git merge origin/main"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [quality, unit-test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
