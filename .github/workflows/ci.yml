name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --dev --frozen
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pyright

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --dev --frozen
      - run: uv run pytest tests/unit/ -v --cov=tta --cov-report=xml --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --dev --frozen
      - name: Start test services
        run: timeout 120 docker compose -f docker-compose.test.yml up -d --wait || echo "::warning::Services failed to start within 2 minutes"
      - name: Run integration tests
        run: |
          # Exit code 5 = no tests collected (acceptable during bootstrap)
          uv run pytest tests/integration/ -v --timeout=30 || [ $? -eq 5 ]

      - run: docker compose -f docker-compose.test.yml down
        if: always()

  build:
    runs-on: ubuntu-latest
    needs: [quality, unit-test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
