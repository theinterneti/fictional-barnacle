name: Eval Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Evaluation mode (ci | local | full)"
        required: false
        default: "ci"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --dev --frozen

      - name: Run evaluation pipeline
        env:
          TTA_API_BASE_URL: ${{ vars.TTA_API_BASE_URL }}
          TTA_API_KEY: ${{ secrets.TTA_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          uv run python -m tta.eval \
            --mode "${{ inputs.mode || 'ci' }}" \
            --output-dir data/eval_output

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@7ea3a6d7cd1fcab7a2fd6e69ce8aa60459c3cf69 # v4.6.2
        with:
          name: eval-reports
          path: data/eval_output/
          retention-days: 30
          if-no-files-found: ignore
